[skin]
    description = Monokai
    256colors = false

[Lines]
    horiz = ─
    vert = │
    lefttop = ┌
    righttop = ┐
    leftbottom = └
    rightbottom = ┘
    topmiddle = ┬
    bottommiddle = ┴
    leftmiddle = ├
    rightmiddle = ┤
    cross = ┼
    dhoriz = ─
    dvert = │
    dlefttop = ┌
    drighttop = ┐
    dleftbottom = └
    drightbottom = ┘
    dtopmiddle = ┬
    dbottommiddle = ┴
    dleftmiddle = ├
    drightmiddle = ┤

[core]
    _default_       = white;default
    selected        = black;blue
    marked          = yellow;;bold
    markselect      = black;blue;bold
    gauge           = white;blue
    input           = brightyellow;gray
    inputunchanged  = brightyellow;gray
    inputmark       = yellow;gray;bold
    commandlinemark = black;brightblue;bold
    reverse         = brightred;default
    header          = brightred
    disabled        = blue;lightgray
    inputhistory    = white;black
    #commandhistory =

[dialog]
    _default_       = white;black
    dfocus          = black;blue
    dhotnormal      = brightyellow
    dhotfocus       = brightyellow
    dtitle          = red;;bold

[error]
    _default_       = black;red
    errdfocus       = white;black;bold
    errdhotnormal   = red;black
    errdhotfocus    = red;black
    errdtitle       = white;black;bold

[filehighlight]
    directory       = ;;bold
    executable      = brightgreen
    symlink         = cyan
    hardlink        =
    stalelink       = brightred
    device          = lightgray
    special         = lightgray
    core            =
    temp            =
    archive         =
    doc             =
    source          =
    media           =
    graph           =
    database        =

[menu]
    _default_       = white;black
    menusel         = black;blue
    menuhot         = red
    menuhotsel      = red;blue
    menuinactive    = gray

[popupmenu]
    _default_       = white;black
    menusel         = black;blue
    menutitle       = red;black;bold

[buttonbar]
    button          = white
    hotkey          = red;black

[statusbar]
    _default_       = white;black

[help]
    _default_ = color0;color7
    helpitalic = color10;;bold
    helpbold = color5
    helplink = color14
    helpslink = color11;color2;bold
    helptitle = color11;;bold

[editor]
    _default_ = brightyellow;default
    editbold = ;;bold
    editmarked = color11;color2;bold
    editwhitespace = color12;black
    editlinestate = color2;color0
    bookmark = color0;color7
    bookmarkfound = color0;color7
    editrightmargin = color0;color7

[viewer]
    _default_       = brightyellow;default
    viewbold        = ;;bold
    viewunderline   = ;;underline
    viewselected    = white;black

[diffviewer]
    changedline = color15;color4
    changednew = color15;color2
    changed = color15;color6
    added = color0;color7
    removed = color8;color0
    error = color15;color1

[widget-common]
    sort-sign-up = ↑
    sort-sign-down = ↓

[widget-panel]
    hiddenfiles-sign-show = •
    hiddenfiles-sign-hide = ○
    history-prev-item-sign = «
    history-next-item-sign = »
    history-show-list-sign = ^

[widget-scollbar]
    first-vert-char = ↑
    last-vert-char = ↓
    first-horiz-char = «
    last-horiz-char = »
    current-char = ■
    background-char = ▒

[widget-editor]
    window-state-char = *
    window-close-char = X
